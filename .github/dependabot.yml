version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 4
    pull-request-branch-name:
      separator: "-"
    groups:
      actions-deps:
        dependency-type: "all"
        patterns:
          - "github/codeql-action"
          - "github/codeql-action/*"
          - "actions/*"
  - package-ecosystem: "gomod"
    directory: "/"
    open-pull-requests-limit: 10
    schedule:
      interval: "daily"
    cooldown:
      default-days: 4
    pull-request-branch-name:
      separator: "-"
# Custom settings
